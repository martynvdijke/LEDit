root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ledit ."
  bin = "ledit"
  include_ext = ["go", "tpl", "tmpl", "tpl", "html", "css", "js", "ts"]
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "node_modules", ".git", "server-py", "client"]
  include_dir = ["."]
  exclude_file = []
  delay = 1000
  log = "air_errors.log"
  stop_on_error = true
  send_interrupt = false
  kill_delay = "500ms"

[log]
  main_only = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
