name: CI
on:
  push:
    branches-ignore: ['main']
  pull_request:
    branches: ["**"]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.24' }
      - run: go mod download
      - run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - run: go test -v ./...
      - run: go build -o ledit .
