<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEDit - Live Feed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        <div class="d-flex flex-column flex-shrink-0 p-3 bg-dark text-white" style="width: 250px; min-height: 100vh;">
            <a href="/" class="d-flex align-items-center mb-3 text-white text-decoration-none">
                <span class="fs-4">LEDit</span>
            </a>
            <hr>
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item">
                    <a href="/" class="nav-link text-white">Home</a>
                </li>
                <li>
                    <a href="/admin/" class="nav-link text-white">Dashboard</a>
                </li>
                <li>
                    <a href="/admin/settings" class="nav-link text-white">Settings</a>
                </li>
                <li>
                    <a href="/admin/datasources/sonarr/new" class="nav-link text-white">Add Sonarr</a>
                </li>
                <li>
                    <a href="/admin/datasources/radarr/new" class="nav-link text-white">Add Radarr</a>
                </li>
                <li>
                    <a href="/admin/datasources/f1/new" class="nav-link text-white">Add F1</a>
                </li>
                <li>
                    <a href="/admin/datasources/weather/new" class="nav-link text-white">Add Weather</a>
                </li>
                <li>
                    <a href="/admin/datasources/homeassistant/new" class="nav-link text-white">Add HA</a>
                </li>
                <li>
                    <a href="/admin/datasources/untappd/new" class="nav-link text-white">Add Untappd</a>
                </li>
                <li>
                    <a href="/admin/datasources/images/new" class="nav-link text-white">Add Image</a>
                </li>
                <li>
                    <a href="/admin/datasources/videos/new" class="nav-link text-white">Add Video</a>
                </li>
                <li>
                    <a href="/admin/datasources/crypto/new" class="nav-link text-white">Add Crypto</a>
                </li>
            </ul>
        </div>
        <div class="container-fluid p-4">
            <div class="row">
                <div class="col-12 text-center">
                    <h1>LEDit Live Feed</h1>
                    <div id="media-container" class="mt-4">
                        <img id="media-display" src="" alt="LEDit Feed" style="max-width: 100%; display: none;">
                        <video id="video-display" autoplay muted style="max-width: 100%; display: none;"></video>
                        <p id="status-text" class="text-muted">Connecting...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
    (function() {
        const imgEl = document.getElementById('media-display');
        const videoEl = document.getElementById('video-display');
        const statusEl = document.getElementById('status-text');
        let ws = null;
        let reconnectAttempts = 0;
        const maxReconnect = 5;

        function connect() {
            const host = window.location.host;
            ws = new WebSocket('ws://' + host + '/ws/feed');

            ws.onopen = function() {
                statusEl.textContent = 'Connected';
                reconnectAttempts = 0;
            };

            ws.onmessage = function(event) {
                const msg = JSON.parse(event.data);
                if (msg.format === 'MP4') {
                    imgEl.style.display = 'none';
                    videoEl.style.display = 'block';
                    videoEl.src = 'data:video/mp4;base64,' + msg.image;
                    videoEl.play();
                    videoEl.onended = function() {
                        videoEl.style.display = 'none';
                    };
                } else {
                    videoEl.style.display = 'none';
                    videoEl.pause();
                    imgEl.style.display = 'block';
                    imgEl.src = 'data:image/' + msg.format.toLowerCase() + ';base64,' + msg.image;
                }
                statusEl.textContent = 'Receiving';
            };

            ws.onclose = function() {
                statusEl.textContent = 'Disconnected';
                imgEl.style.display = 'none';
                videoEl.style.display = 'none';
                if (reconnectAttempts < maxReconnect) {
                    reconnectAttempts++;
                    const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
                    statusEl.textContent = 'Reconnecting in ' + (delay / 1000) + 's...';
                    setTimeout(connect, delay);
                } else {
                    statusEl.textContent = 'Connection failed';
                }
            };

            ws.onerror = function() {
                ws.close();
            };
        }
        connect();
    })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
