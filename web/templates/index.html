<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEDit - Live Feed</title>
    <link rel="manifest" href="/static/pwa/manifest.json">
    <meta name="theme-color" content="#212529">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="LEDit">
    <link rel="apple-touch-icon" href="/static/pwa/icon-192.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    {{if .umamiEnabled}}
    <script async defer src="{{.umamiEndpoint}}/script.js" data-website-id="{{.umamiWebsiteID}}" data-host-url="{{.umamiEndpoint}}"></script>
    {{end}}
    <style>
        #matrix-overlay {
            pointer-events: none;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            opacity: 0.15;
        }
        #media-container {
            position: relative;
            display: inline-block;
        }
        .feed-controls .btn {
            margin-right: 0.25rem;
        }
        #status-text.connected { color: #198754; }
        #status-text.disconnected { color: #dc3545; }
        #status-text.receiving { color: #0d6efd; }
        .fullscreen-active {
            background: #000;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fullscreen-active #matrix-overlay { opacity: 0.08; }

        /* Clock overlay */
        #clock-overlay {
            position: absolute;
            top: 12px;
            right: 16px;
            z-index: 20;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 1.4rem;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0,255,0,0.6);
            pointer-events: none;
            opacity: 0.85;
            letter-spacing: 2px;
        }
        .fullscreen-active #clock-overlay {
            font-size: 2.4rem;
        }

        /* Marquee text */
        #marquee-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 20;
            background: rgba(0,0,0,0.6);
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            padding: 4px 0;
            overflow: hidden;
            white-space: nowrap;
            pointer-events: none;
        }
        #marquee-text {
            display: inline-block;
            animation: marquee-scroll 15s linear infinite;
            padding-left: 100%;
        }
        @keyframes marquee-scroll {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
        .fullscreen-active #marquee-container {
            font-size: 1.4rem;
            padding: 8px 0;
        }

        /* Image fade transitions */
        #media-display {
            transition: opacity 0.4s ease-in-out;
        }
        #media-display.fade-out {
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="d-flex">
        {{template "sidebar" .}}
        <div class="container-fluid p-4">
            <div class="row">
                <div class="col-12 text-center">
                    <h1>LEDit Live Feed</h1>
                    <div class="d-flex justify-content-center align-items-center gap-3 mb-3">
                        <span id="source-label" class="badge bg-primary fs-5">Waiting...</span>
                        <span id="status-text" class="fs-6">Connecting...</span>
                        <span id="next-label" class="badge bg-secondary fs-6">Next: --</span>
                    </div>
                    <div id="media-container" class="mt-2" style="min-height: 100px">
                        <canvas id="matrix-overlay" width="400" height="400"></canvas>
                        <div id="clock-overlay"></div>
                        <div id="marquee-container"><span id="marquee-text">LEDit Live</span></div>
                        <img id="media-display" src="" alt="LEDit Feed" style="max-width: 100%; display: none;">
                        <video id="video-display" autoplay muted style="max-width: 100%; display: none;"></video>
                    </div>
                    <div class="feed-controls mt-3">
                        <button id="btn-pause" class="btn btn-warning">Pause</button>
                        <button id="btn-skip" class="btn btn-primary">Skip</button>
                        <button id="btn-fullscreen" class="btn btn-secondary">Fullscreen</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
    (function() {
        const imgEl = document.getElementById('media-display');
        const videoEl = document.getElementById('video-display');
        const statusEl = document.getElementById('status-text');
        const sourceEl = document.getElementById('source-label');
        const nextEl = document.getElementById('next-label');
        const canvas = document.getElementById('matrix-overlay');
        const ctx = canvas.getContext('2d');
        const clockEl = document.getElementById('clock-overlay');
        const marqueeEl = document.getElementById('marquee-text');
        let ws = null;
        let reconnectAttempts = 0;
        const maxReconnect = 5;
        let paused = false;
        let fullscreen = false;

        // Update clock overlay every second
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            clockEl.textContent = h + ':' + m + ':' + s;
        }
        updateClock();
        setInterval(updateClock, 1000);

        function drawMatrix(displayWidth) {
            const w = 64;
            const h = 64;
            canvas.width = displayWidth;
            canvas.height = displayWidth;
            const cellSize = displayWidth / w;
            ctx.strokeStyle = 'rgba(0, 255, 0, 0.3)';
            ctx.lineWidth = 0.5;
            for (let x = 0; x <= w; x++) {
                ctx.beginPath();
                ctx.moveTo(x * cellSize, 0);
                ctx.lineTo(x * cellSize, displayWidth);
                ctx.stroke();
            }
            for (let y = 0; y <= h; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * cellSize);
                ctx.lineTo(displayWidth, y * cellSize);
                ctx.stroke();
            }
        }

        const statusObserver = new MutationObserver(function() {
            const text = statusEl.textContent.toLowerCase();
            statusEl.className = 'fs-6';
            if (text.includes('connect')) statusEl.classList.add('connected');
            else if (text.includes('disconnect')) statusEl.classList.add('disconnected');
            else if (text.includes('receiv')) statusEl.classList.add('receiving');
        });
        statusObserver.observe(statusEl, { childList: true, characterData: true, subtree: true });

        function connect() {
            const host = window.location.host;
            ws = new WebSocket('ws://' + host + '/ws/feed');

            ws.onopen = function() {
                statusEl.textContent = 'Connected';
                reconnectAttempts = 0;
            };

            ws.onmessage = function(event) {
                const msg = JSON.parse(event.data);
                if (msg.source) {
                    sourceEl.textContent = msg.source;
                    marqueeEl.textContent = ' ' + msg.source + ' | LEDit Live Feed ';
                }
                if (msg.next) {
                    nextEl.textContent = 'Next: ' + msg.next;
                }
                if (msg.format === 'MP4') {
                    imgEl.style.display = 'none';
                    videoEl.style.display = 'block';
                    videoEl.src = 'data:video/mp4;base64,' + msg.image;
                    videoEl.play();
                    videoEl.onended = function() {
                        videoEl.style.display = 'none';
                    };
                    drawMatrix(videoEl.clientWidth || 400);
                } else if (msg.format) {
                    videoEl.style.display = 'none';
                    videoEl.pause();
                    // Fade transition for images
                    imgEl.classList.add('fade-out');
                    setTimeout(function() {
                        imgEl.style.display = 'block';
                        imgEl.src = 'data:image/' + msg.format.toLowerCase() + ';base64,' + msg.image;
                        imgEl.onload = function() {
                            imgEl.classList.remove('fade-out');
                            drawMatrix(imgEl.clientWidth || 400);
                        };
                    }, 200);
                }
                statusEl.textContent = 'Receiving';
            };

            ws.onclose = function() {
                statusEl.textContent = 'Disconnected';
                sourceEl.textContent = '--';
                imgEl.style.display = 'none';
                videoEl.style.display = 'none';
                if (reconnectAttempts < maxReconnect) {
                    reconnectAttempts++;
                    const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
                    statusEl.textContent = 'Reconnecting in ' + (delay / 1000) + 's...';
                    setTimeout(connect, delay);
                } else {
                    statusEl.textContent = 'Connection failed';
                }
            };

            ws.onerror = function() {
                ws.close();
            };
        }

        window.togglePause = function() {
            if (!ws) return;
            paused = !paused;
            document.getElementById('btn-pause').textContent = paused ? 'Resume' : 'Pause';
            ws.send(JSON.stringify({ action: paused ? 'pause' : 'resume' }));
        };

        window.skipFeed = function() {
            if (!ws) return;
            ws.send(JSON.stringify({ action: 'next' }));
        };

        window.toggleFullscreen = function() {
            const container = document.querySelector('.container-fluid');
            const feedSection = container.querySelector('.row');
            if (!fullscreen) {
                feedSection.classList.add('fullscreen-active');
                document.querySelector('.d-flex > div:first-child').style.display = 'none';
                document.querySelector('.d-flex > .container-fluid').style.padding = '0';
                document.getElementById('btn-fullscreen').textContent = 'Exit Fullscreen';
            } else {
                feedSection.classList.remove('fullscreen-active');
                document.querySelector('.d-flex > div:first-child').style.display = '';
                document.querySelector('.d-flex > .container-fluid').style.padding = '';
                document.getElementById('btn-fullscreen').textContent = 'Fullscreen';
            }
            fullscreen = !fullscreen;
        };

        document.getElementById('btn-pause').addEventListener('click', window.togglePause);
        document.getElementById('btn-skip').addEventListener('click', window.skipFeed);
        document.getElementById('btn-fullscreen').addEventListener('click', window.toggleFullscreen);

        connect();

        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/pwa/sw.js');
        }
    })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
