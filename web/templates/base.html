<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEDit - {{.title}}</title>
    <link rel="manifest" href="/static/pwa/manifest.json">
    <meta name="theme-color" content="#212529">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="LEDit">
    <link rel="apple-touch-icon" href="/static/pwa/icon-192.png">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/pwa/sw.js');
        }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    {{if .umamiEnabled}}
    <script async defer src="{{.umamiEndpoint}}/script.js" data-website-id="{{.umamiWebsiteID}}" data-host-url="{{.umamiEndpoint}}"></script>
    {{end}}
    {{if .eink_mode}}<link rel="stylesheet" href="/static/eink.css">{{end}}
</head>
<body{{if .eink_mode}} class="eink-mode"{{end}}>
    <div class="d-flex">
        {{template "sidebar" .}}
        <div class="container-fluid p-4">
            {{.body}}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // E-Ink toggle instant feedback
    document.addEventListener('click', function(e) {
        var link = e.target.closest('#eink-toggle-link');
        if (link) {
            document.body.classList.toggle('eink-mode');
            if (!document.querySelector('link[href="/static/eink.css"]')) {
                var el = document.createElement('link');
                el.rel = 'stylesheet';
                el.href = '/static/eink.css';
                document.head.appendChild(el);
            }
        }
    });
    </script>
</body>
</html>
