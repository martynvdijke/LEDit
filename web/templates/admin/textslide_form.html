<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEDit - {{if .edit}}Edit{{else}}New{{end}} Text Slide</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        {{template "sidebar" .}}
        <div class="container-fluid p-4">
            <h1>{{if .edit}}Edit{{else}}New{{end}} Text Slide</h1>
            <form method="POST" action="/admin/textslides{{if .edit}}/{{.obj.ID}}/edit{{else}}/new{{end}}" class="mt-4">
                <div class="mb-3">
                    <label for="content" class="form-label">Text Content</label>
                    <textarea class="form-control" id="content" name="content" rows="3" {{if not .edit}}required{{end}}>{{if .obj}}{{.obj.Content}}{{end}}</textarea>
                </div>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="color" class="form-label">Text Color</label>
                        <input type="color" class="form-control form-control-color" id="color" name="color" value="{{if .obj}}{{.obj.Color}}{{else}}#FFFFFF{{end}}">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="bg_color" class="form-label">Background Color</label>
                        <input type="color" class="form-control form-control-color" id="bg_color" name="bg_color" value="{{if .obj}}{{.obj.BgColor}}{{else}}#000000{{end}}">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="font_size" class="form-label">Font Size</label>
                        <input type="number" class="form-control" id="font_size" name="font_size" min="12" max="120" value="{{if .obj}}{{.obj.FontSize}}{{else}}32{{end}}">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">{{if .edit}}Update{{else}}Create{{end}}</button>
                <a href="/admin/" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
