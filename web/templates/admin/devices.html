<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEDit - Devices</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        {{template "sidebar" .}}
        <div class="container-fluid p-4">
            <h1>Devices</h1>
            <a href="/admin/devices/new" class="btn btn-primary mb-3">New Device</a>
            <table class="table table-striped">
                <thead>
                    <tr><th>ID</th><th>Name</th><th>IP</th><th>Port</th><th>Matrix</th><th>Enabled</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    {{range .devices}}
                    <tr>
                        <td>{{.ID}}</td><td>{{.Name}}</td><td>{{.IP}}</td><td>{{.Port}}</td>
                        <td>{{.Width}}x{{.Height}}</td>
                        <td>{{if .Enabled}}Yes{{else}}No{{end}}</td>
                        <td>
                            <a href="/admin/devices/{{.ID}}/edit" class="btn btn-sm btn-primary">Edit</a>
                            <form method="POST" action="/admin/devices/{{.ID}}/delete" style="display:inline">
                                <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                    {{else}}
                    <tr><td colspan="7" class="text-muted">No devices configured.</td></tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
