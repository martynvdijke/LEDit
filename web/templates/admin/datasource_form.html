<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEDit - {{if .edit}}Edit{{else}}New{{end}} {{.type}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        {{template "sidebar" .}}
        <div class="container-fluid p-4">
            <h1>{{if .edit}}Edit{{else}}New{{end}} {{.type}} Source</h1>
            <form method="POST" action="/admin/datasources/{{.endpoint}}{{if .edit}}/{{.obj.ID}}/edit{{else}}/new{{end}}" class="mt-4" {{if .is_media}}enctype="multipart/form-data"{{end}}>
                {{if .is_media}}
                <div class="mb-3">
                    <label for="file" class="form-label">File</label>
                    <input type="file" class="form-control" id="file" name="file" accept="{{.extensions}}" {{if not .edit}}required{{end}}>
                    {{if .edit}}<small class="text-muted">Leave empty to keep current file</small>{{end}}
                </div>
                {{if .obj.Path}}
                <div class="mb-3">
                    <p>Current: <a href="/{{.obj.Path}}">{{.obj.Path}}</a></p>
                </div>
                {{end}}
                {{else if .has_name}}
                <div class="mb-3">
                    <label for="name" class="form-label">Display Name</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{if .obj}}{{.obj.Name}}{{end}}">
                </div>
                <div class="mb-3">
                    <label for="url" class="form-label">URL / Feed URL</label>
                    <input type="text" class="form-control" id="url" name="url" value="{{if .obj}}{{.obj.URL}}{{end}}">
                </div>
                {{else}}
                <div class="mb-3">
                    <label for="token" class="form-label">API Token</label>
                    <input type="text" class="form-control" id="token" name="token" value="{{if .obj}}{{.obj.Token}}{{end}}">
                </div>
                <div class="mb-3">
                    <label for="url" class="form-label">URL</label>
                    <input type="text" class="form-control" id="url" name="url" value="{{if .obj}}{{.obj.URL}}{{end}}">
                </div>
                {{end}}
                <button type="submit" class="btn btn-primary">{{if .edit}}Update{{else}}Create{{end}}</button>
                <a href="/admin/" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
