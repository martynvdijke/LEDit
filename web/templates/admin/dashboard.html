{{template "base" .}}
{{define "title"}}Admin Dashboard{{end}}
{{define "content"}}
<h1>Admin Dashboard</h1>
{{if .has_settings}}
<div class="row mt-4">
    <div class="col-md-3">
        <div class="card text-white bg-primary mb-3">
            <div class="card-body">
                <h5 class="card-title">Total Sources</h5>
                <p class="card-text display-6">{{.total_sources}}</p>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-white bg-success mb-3">
            <div class="card-body">
                <h5 class="card-title">Images</h5>
                <p class="card-text display-6">{{.image_count}}</p>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-white bg-info mb-3">
            <div class="card-body">
                <h5 class="card-title">Videos</h5>
                <p class="card-text display-6">{{.video_count}}</p>
            </div>
        </div>
    </div>
</div>
{{else}}
<p class="text-muted mt-4">No settings configured yet. <a href="/admin/settings">Configure settings</a></p>
{{end}}
{{end}}
