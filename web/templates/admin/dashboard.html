<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEDit - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        <div class="d-flex flex-column flex-shrink-0 p-3 bg-dark text-white" style="width: 250px; min-height: 100vh;">
            <a href="/" class="d-flex align-items-center mb-3 text-white text-decoration-none">
                <span class="fs-4">LEDit</span>
            </a>
            <hr>
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item">
                    <a href="/" class="nav-link text-white">Home</a>
                </li>
                <li>
                    <a href="/admin/" class="nav-link text-white">Dashboard</a>
                </li>
                <li>
                    <a href="/admin/settings" class="nav-link text-white">Settings</a>
                </li>
                <li>
                    <a href="/admin/datasources/sonarr/new" class="nav-link text-white">Add Sonarr</a>
                </li>
                <li>
                    <a href="/admin/datasources/radarr/new" class="nav-link text-white">Add Radarr</a>
                </li>
            </ul>
        </div>
        <div class="container-fluid p-4">
            <h1>Admin Dashboard</h1>
            {{if .has_settings}}
            <div class="row mt-4">
                <div class="col-md-3">
                    <div class="card text-white bg-primary mb-3">
                        <div class="card-body">
                            <h5 class="card-title">Total Sources</h5>
                            <p class="card-text display-6">{{.total_sources}}</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-success mb-3">
                        <div class="card-body">
                            <h5 class="card-title">Images</h5>
                            <p class="card-text display-6">{{.image_count}}</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-info mb-3">
                        <div class="card-body">
                            <h5 class="card-title">Videos</h5>
                            <p class="card-text display-6">{{.video_count}}</p>
                        </div>
                    </div>
                </div>
            </div>
            {{else}}
            <p class="text-muted mt-4">No settings configured yet. <a href="/admin/settings">Configure settings</a></p>
            {{end}}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
