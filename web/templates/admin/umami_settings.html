<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEDit - Umami Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        {{template "sidebar" .}}
        <div class="container-fluid p-4">
            <h1>Umami Analytics</h1>
            <p class="text-muted">Configure self-hosted Umami analytics for the public web interface.</p>
            <form method="POST" action="/admin/settings/umami" class="mt-4">
                <div class="mb-3">
                    <label for="endpoint" class="form-label">Umami Endpoint URL</label>
                    <input type="text" class="form-control" id="endpoint" name="endpoint" value="{{if .settings}}{{.settings.Endpoint}}{{end}}" placeholder="https://umami.example.com" required>
                    <div class="form-text">The base URL of your self-hosted Umami instance.</div>
                </div>
                <div class="mb-3">
                    <label for="website_id" class="form-label">Website ID</label>
                    <input type="text" class="form-control" id="website_id" name="website_id" value="{{if .settings}}{{.settings.WebsiteID}}{{end}}" placeholder="e.g., abc123-def456" required>
                    <div class="form-text">The website tracking ID from your Umami dashboard.</div>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="enable" name="enable" {{if and .settings .settings.Enable}}checked{{end}}>
                    <label for="enable" class="form-check-label">Enable Umami Tracking</label>
                    <div class="form-text">When enabled, the Umami tracking script is injected into public pages.</div>
                </div>
                <button type="submit" class="btn btn-primary">Save Settings</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
