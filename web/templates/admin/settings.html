<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEDit - Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        <div class="d-flex flex-column flex-shrink-0 p-3 bg-dark text-white" style="width: 250px; min-height: 100vh;">
            <a href="/" class="d-flex align-items-center mb-3 text-white text-decoration-none">
                <span class="fs-4">LEDit</span>
            </a>
            <hr>
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item">
                    <a href="/" class="nav-link text-white">Home</a>
                </li>
                <li>
                    <a href="/admin/" class="nav-link text-white">Dashboard</a>
                </li>
                <li>
                    <a href="/admin/settings" class="nav-link text-white">Settings</a>
                </li>
                <li>
                    <a href="/admin/schedules" class="nav-link text-white">Schedules</a>
                </li>
                <li>
                    <a href="/admin/notifications" class="nav-link text-white">Notifications</a>
                </li>
                <li>
                    <a href="/admin/datasources/sonarr/new" class="nav-link text-white">Add Sonarr</a>
                </li>
                <li>
                    <a href="/admin/datasources/radarr/new" class="nav-link text-white">Add Radarr</a>
                </li>
                <li>
                    <a href="/admin/datasources/f1/new" class="nav-link text-white">Add F1</a>
                </li>
                <li>
                    <a href="/admin/datasources/weather/new" class="nav-link text-white">Add Weather</a>
                </li>
                <li>
                    <a href="/admin/datasources/homeassistant/new" class="nav-link text-white">Add HA</a>
                </li>
                <li>
                    <a href="/admin/datasources/untappd/new" class="nav-link text-white">Add Untappd</a>
                </li>
                <li>
                    <a href="/admin/datasources/images/new" class="nav-link text-white">Add Image</a>
                </li>
                <li>
                    <a href="/admin/datasources/videos/new" class="nav-link text-white">Add Video</a>
                </li>
                <li>
                    <a href="/admin/datasources/crypto/new" class="nav-link text-white">Add Crypto</a>
                </li>
            </ul>
        </div>
        <div class="container-fluid p-4">
            <h1>General Settings</h1>
            <form method="POST" action="/admin/settings" class="mt-4">
                <div class="mb-3">
                    <label for="timeout" class="form-label">Timeout (seconds)</label>
                    <input type="number" step="0.1" class="form-control" id="timeout" name="timeout" value="{{if .settings}}{{.settings.Timeout}}{{else}}5{{end}}" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="random" name="random">
                    <label for="random" class="form-check-label">Random order</label>
                </div>
                <div class="mb-3">
                    <label for="width" class="form-label">Matrix Width</label>
                    <input type="number" class="form-control" id="width" name="width" value="{{if .settings}}{{.settings.Width}}{{else}}64{{end}}">
                </div>
                <div class="mb-3">
                    <label for="height" class="form-label">Matrix Height</label>
                    <input type="number" class="form-control" id="height" name="height" value="{{if .settings}}{{.settings.Height}}{{else}}64{{end}}">
                </div>
                <button type="submit" class="btn btn-primary">Save</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
