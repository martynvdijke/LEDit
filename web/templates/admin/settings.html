<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEDit - Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        {{template "sidebar" .}}
        <div class="container-fluid p-4">
            <h1>General Settings</h1>
            <form method="POST" action="/admin/settings" class="mt-4">
                <div class="mb-3">
                    <label for="timeout" class="form-label">Timeout (seconds)</label>
                    <input type="number" step="0.1" class="form-control" id="timeout" name="timeout" value="{{if .settings}}{{.settings.Timeout}}{{else}}5{{end}}" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="random" name="random">
                    <label for="random" class="form-check-label">Random order</label>
                </div>
                <div class="mb-3">
                    <label for="width" class="form-label">Matrix Width</label>
                    <input type="number" class="form-control" id="width" name="width" value="{{if .settings}}{{.settings.Width}}{{else}}64{{end}}">
                </div>
                <div class="mb-3">
                    <label for="height" class="form-label">Matrix Height</label>
                    <input type="number" class="form-control" id="height" name="height" value="{{if .settings}}{{.settings.Height}}{{else}}64{{end}}">
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="eink_mode" name="eink_mode"{{if and .settings .settings.EinkMode}} checked{{end}}>
                    <label for="eink_mode" class="form-check-label">E-Ink Mode (default for new visitors)</label>
                </div>
                <button type="submit" class="btn btn-primary">Save</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
