{{template "base" .}}
{{define "title"}}Settings{{end}}
{{define "content"}}
<h1>General Settings</h1>
<form method="POST" action="/admin/settings" class="mt-4">
    <div class="mb-3">
        <label for="timeout" class="form-label">Timeout (seconds)</label>
        <input type="number" step="0.1" class="form-control" id="timeout" name="timeout" value="{{if .settings}}{{.settings.Timeout}}{{else}}5{{end}}" required>
    </div>
    <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="random" name="random" {{if .settings.Random}}checked{{end}}>
        <label for="random" class="form-check-label">Random order</label>
    </div>
    <div class="mb-3">
        <label for="width" class="form-label">Matrix Width</label>
        <input type="number" class="form-control" id="width" name="width" value="{{if .settings}}{{.settings.Width}}{{else}}64{{end}}">
    </div>
    <div class="mb-3">
        <label for="height" class="form-label">Matrix Height</label>
        <input type="number" class="form-control" id="height" name="height" value="{{if .settings}}{{.settings.Height}}{{else}}64{{end}}">
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
</form>
{{end}}
