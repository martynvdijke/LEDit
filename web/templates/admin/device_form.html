<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEDit - {{if .edit}}Edit{{else}}New{{end}} Device</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        {{template "sidebar" .}}
        <div class="container-fluid p-4">
            <h1>{{if .edit}}Edit{{else}}New{{end}} Device</h1>
            <form method="POST" action="/admin/devices{{if .edit}}/{{.obj.ID}}/edit{{else}}/new{{end}}" class="mt-4">
                <div class="mb-3"><label for="name" class="form-label">Name</label><input type="text" class="form-control" id="name" name="name" value="{{if .obj}}{{.obj.Name}}{{end}}"></div>
                <div class="mb-3"><label for="ip" class="form-label">IP Address</label><input type="text" class="form-control" id="ip" name="ip" value="{{if .obj}}{{.obj.IP}}{{end}}"></div>
                <div class="mb-3"><label for="port" class="form-label">Port</label><input type="number" class="form-control" id="port" name="port" value="{{if .obj}}{{.obj.Port}}{{else}}6270{{end}}"></div>
                <div class="mb-3"><label for="width" class="form-label">Matrix Width</label><input type="number" class="form-control" id="width" name="width" value="{{if .obj}}{{.obj.Width}}{{else}}64{{end}}"></div>
                <div class="mb-3"><label for="height" class="form-label">Matrix Height</label><input type="number" class="form-control" id="height" name="height" value="{{if .obj}}{{.obj.Height}}{{else}}64{{end}}"></div>
                <div class="mb-3"><label for="username" class="form-label">Username</label><input type="text" class="form-control" id="username" name="username" value="{{if .obj}}{{.obj.Username}}{{end}}"></div>
                <div class="mb-3"><label for="password" class="form-label">Password</label><input type="password" class="form-control" id="password" name="password" value="{{if .obj}}{{.obj.Password}}{{end}}"></div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="enabled" name="enabled" {{if not .edit}}checked{{else if .obj.Enabled}}checked{{end}}>
                    <label for="enabled" class="form-check-label">Enabled</label>
                </div>
                <button type="submit" class="btn btn-primary">{{if .edit}}Update{{else}}Create{{end}}</button>
                <a href="/admin/devices" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
