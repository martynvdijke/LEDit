<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEDit - Schedules</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        {{template "sidebar" .}}
        <div class="container-fluid p-4">
            <h1>Schedules</h1>
            <a href="/admin/schedules/new" class="btn btn-primary mb-3">New Schedule</a>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Time Range</th>
                        <th>Enabled</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {{range .schedules}}
                    <tr>
                        <td>{{.ID}}</td>
                        <td>{{.Name}}</td>
                        <td>{{.TimeRange}}</td>
                        <td>{{if .Enabled}}Yes{{else}}No{{end}}</td>
                        <td>
                            <a href="/admin/schedules/{{.ID}}/edit" class="btn btn-sm btn-primary">Edit</a>
                            <form method="POST" action="/admin/schedules/{{.ID}}/delete" style="display:inline">
                                <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                    {{else}}
                    <tr>
                        <td colspan="5" class="text-muted">No schedules configured.</td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
