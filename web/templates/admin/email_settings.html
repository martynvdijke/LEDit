<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEDit - Email Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        {{template "sidebar" .}}
        <div class="container-fluid p-4">
            <h1>Email Settings</h1>
            <form method="POST" action="/admin/settings/email" class="mt-4">
                <div class="mb-3">
                    <label for="host" class="form-label">SMTP Host</label>
                    <input type="text" class="form-control" id="host" name="host" value="{{if .settings}}{{.settings.Host}}{{end}}" placeholder="smtp.example.com" required>
                </div>
                <div class="mb-3">
                    <label for="port" class="form-label">Port</label>
                    <input type="number" class="form-control" id="port" name="port" value="{{if .settings}}{{.settings.Port}}{{else}}587{{end}}" min="1" max="65535">
                </div>
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" value="{{if .settings}}{{.settings.Username}}{{end}}">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" value="{{if .settings}}{{.settings.Password}}{{end}}">
                </div>
                <div class="mb-3">
                    <label for="from_address" class="form-label">From Address</label>
                    <input type="email" class="form-control" id="from_address" name="from_address" value="{{if .settings}}{{.settings.FromAddress}}{{end}}" placeholder="ledit@example.com">
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="use_tls" name="use_tls" {{if not .settings}}checked{{else if .settings.UseTLS}}checked{{end}}>
                    <label for="use_tls" class="form-check-label">Use TLS</label>
                </div>
                <button type="submit" class="btn btn-primary">Save Settings</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
