<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEDit - {{if .edit}}Edit{{else}}New{{end}} Schedule</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        {{template "sidebar" .}}
        <div class="container-fluid p-4">
            <h1>{{if .edit}}Edit{{else}}New{{end}} Schedule</h1>
            <form method="POST" action="/admin/schedules{{if .edit}}/{{.obj.ID}}/edit{{else}}/new{{end}}" class="mt-4">
                <div class="mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{if .obj}}{{.obj.Name}}{{end}}" required>
                </div>
                <div class="mb-3">
                    <label for="time_range" class="form-label">Time Range (e.g. 08:00-12:00)</label>
                    <input type="text" class="form-control" id="time_range" name="time_range" value="{{if .obj}}{{.obj.TimeRange}}{{end}}" placeholder="08:00-12:00">
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="enabled" name="enabled" {{if not .edit}}checked{{else if .obj.Enabled}}checked{{end}}>
                    <label for="enabled" class="form-check-label">Enabled</label>
                </div>
                <button type="submit" class="btn btn-primary">{{if .edit}}Update{{else}}Create{{end}}</button>
                <a href="/admin/schedules" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
