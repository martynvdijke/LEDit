<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEDit - Theme Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        <div class="d-flex flex-column flex-shrink-0 p-3 bg-dark text-white" style="width: 250px; min-height: 100vh;">
            <a href="/" class="d-flex align-items-center mb-3 text-white text-decoration-none"><span class="fs-4">LEDit</span></a>
            <hr>
            <ul class="nav nav-pills flex-column mb-auto">
                <li><a href="/" class="nav-link text-white">Home</a></li>
                <li><a href="/admin/" class="nav-link text-white">Dashboard</a></li>
                <li><a href="/admin/settings" class="nav-link text-white">Settings</a></li>
                <li><a href="/admin/schedules" class="nav-link text-white">Schedules</a></li>
                <li><a href="/admin/devices" class="nav-link text-white">Devices</a></li>
                <li><a href="/admin/theme" class="nav-link text-white">Theme</a></li>
                <li><a href="/admin/analytics" class="nav-link text-white">Analytics</a></li>
                <li><a href="/admin/datasources/sonarr/new" class="nav-link text-white">Add Sonarr</a></li>
                <li><a href="/admin/datasources/radarr/new" class="nav-link text-white">Add Radarr</a></li>
                <li><a href="/admin/datasources/f1/new" class="nav-link text-white">Add F1</a></li>
                <li><a href="/admin/datasources/weather/new" class="nav-link text-white">Add Weather</a></li>
                <li><a href="/admin/datasources/homeassistant/new" class="nav-link text-white">Add HA</a></li>
                <li><a href="/admin/datasources/untappd/new" class="nav-link text-white">Add Untappd</a></li>
                <li><a href="/admin/datasources/images/new" class="nav-link text-white">Add Image</a></li>
                <li><a href="/admin/datasources/videos/new" class="nav-link text-white">Add Video</a></li>
                <li><a href="/admin/datasources/crypto/new" class="nav-link text-white">Add Crypto</a></li>
                <li><a href="/admin/datasources/stock/new" class="nav-link text-white">Add Stock</a></li>
                <li><a href="/admin/datasources/rssfeed/new" class="nav-link text-white">Add RSS</a></li>
                <li><a href="/admin/datasources/calendar/new" class="nav-link text-white">Add Calendar</a></li>
                <li><a href="/admin/textslides/new" class="nav-link text-white">Add Text Slide</a></li>
            </ul>
        </div>
        <div class="container-fluid p-4">
            <h1>Theme Editor</h1>
            <form method="POST" action="/admin/theme" class="mt-4">
                <div class="row">
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="bg_color" class="form-label">Background Color</label>
                            <input type="color" class="form-control form-control-color" id="bg_color" name="bg_color" value="{{.theme.bg_color}}">
                        </div>
                        <div class="mb-3">
                            <label for="accent_color" class="form-label">Accent Color</label>
                            <input type="color" class="form-control form-control-color" id="accent_color" name="accent_color" value="{{.theme.accent_color}}">
                        </div>
                        <div class="mb-3">
                            <label for="text_color" class="form-label">Text Color</label>
                            <input type="color" class="form-control form-control-color" id="text_color" name="text_color" value="{{.theme.text_color}}">
                        </div>
                        <div class="mb-3">
                            <label for="title" class="form-label">Title</label>
                            <input type="text" class="form-control" id="title" name="title" value="{{.theme.title}}">
                        </div>
                        <div class="mb-3">
                            <label for="font_size" class="form-label">Font Size</label>
                            <input type="number" class="form-control" id="font_size" name="font_size" value="{{.theme.font_size}}">
                        </div>
                        <button type="submit" class="btn btn-primary">Save Theme</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
