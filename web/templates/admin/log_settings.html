<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEDit - Log Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        {{template "sidebar" .}}
        <div class="container-fluid p-4">
            <h1>Log Settings</h1>
            <form method="POST" action="/admin/settings/logs" class="mt-4">
                <div class="mb-3">
                    <label for="verbosity" class="form-label">Verbosity Level</label>
                    <select class="form-select" id="verbosity" name="verbosity">
                        {{range .levels}}
                        <option value="{{.}}" {{if and $.settings (eq $.settings.Verbosity .)}}selected{{end}}>{{.}}</option>
                        {{end}}
                    </select>
                    <div class="form-text">Minimum log level to capture. Default: warn</div>
                </div>
                <div class="mb-3">
                    <label for="retention_days" class="form-label">Retention (days)</label>
                    <input type="number" class="form-control" id="retention_days" name="retention_days" value="{{if .settings}}{{.settings.RetentionDays}}{{else}}7{{end}}" min="1" max="365">
                    <div class="form-text">Number of days to keep log entries before automatic cleanup.</div>
                </div>

                <hr class="my-4">
                <h3>OpenTelemetry Export</h3>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="otel_enabled" name="otel_enabled" {{if and .settings .settings.OtelEnabled}}checked{{end}}>
                    <label for="otel_enabled" class="form-check-label">Enable OTEL Export</label>
                </div>
                <div class="mb-3">
                    <label for="otel_endpoint" class="form-label">OTEL Endpoint</label>
                    <input type="text" class="form-control" id="otel_endpoint" name="otel_endpoint" value="{{if .settings}}{{.settings.OtelEndpoint}}{{end}}" placeholder="e.g., localhost:4317">
                </div>
                <div class="mb-3">
                    <label for="otel_protocol" class="form-label">OTEL Protocol</label>
                    <select class="form-select" id="otel_protocol" name="otel_protocol">
                        <option value="grpc" {{if and .settings (eq .settings.OtelProtocol "grpc")}}selected{{end}}>gRPC</option>
                        <option value="http" {{if and .settings (eq .settings.OtelProtocol "http")}}selected{{end}}>HTTP</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary">Save Settings</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
